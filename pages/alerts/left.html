<!-- ./pages/alerts/left.html -->

<section class="flex flex-col h-full bg-slate-950">
  <!-- HEADER -->
  <div
    class="h-12 px-4 border-b border-slate-800 flex items-center justify-between shrink-0"
  >
    <div>
      <div class="text-sm font-medium text-slate-200">Alert Details</div>

      <div class="text-[11px] text-slate-500">Restricted-area access</div>
    </div>

    <span
      class="px-2 py-0.5 rounded text-[10px] bg-red-500/20 text-red-400 border border-red-500/30"
    >
      CRITICAL
    </span>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 overflow-auto p-4 space-y-5 text-xs">
    <!-- META -->
    <div class="space-y-2">
      <div class="flex justify-between gap-3">
        <span class="text-slate-500">Timestamp</span>
        <span class="text-slate-300"> 2026-05-29 14:22:31 </span>
      </div>

      <div class="flex justify-between gap-3">
        <span class="text-slate-500">Truck</span>
        <span class="text-slate-300"> TRK-204 </span>
      </div>

      <div class="flex justify-between gap-3">
        <span class="text-slate-500">Driver</span>
        <span class="text-slate-300"> John Peterson </span>
      </div>

      <div class="flex justify-between gap-3">
        <span class="text-slate-500">Location</span>
        <span class="text-slate-300"> Sector B / Gate 4 </span>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="space-y-2">
      <div class="text-[11px] uppercase tracking-wide text-slate-500">
        Actions
      </div>

      <div class="grid grid-cols-2 gap-2">
        <button
          class="h-9 rounded bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 text-amber-300"
        >
          Acknowledge
        </button>

        <button
          class="h-9 rounded bg-green-500/10 hover:bg-green-500/20 border border-green-500/30 text-green-300"
        >
          Resolve
        </button>
      </div>
    </div>

    <!-- ASSIGN -->
    <div class="space-y-2">
      <div class="text-[11px] uppercase tracking-wide text-slate-500">
        Assign Operator
      </div>

      <select
        class="w-full h-9 bg-slate-900 border border-slate-700 rounded px-2 text-slate-200"
      >
        <option>Select operator</option>
        <option>OP-01</option>
        <option>OP-03</option>
        <option>OP-08</option>
        <option>OP-14</option>
      </select>
    </div>

    <!-- CONTACT DRIVER -->
    <div class="space-y-2">
      <div class="text-[11px] uppercase tracking-wide text-slate-500">
        Contact Driver
      </div>

      <textarea
        rows="4"
        placeholder="Send message to driver..."
        class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-200 resize-none"
      ></textarea>

      <button
        class="w-full h-9 rounded bg-cyan-600 hover:bg-cyan-500 text-white"
      >
        Send Message
      </button>
    </div>

    <!-- NOTES -->
    <div class="space-y-2">
      <div class="text-[11px] uppercase tracking-wide text-slate-500">
        Notes
      </div>

      <textarea
        rows="4"
        placeholder="Add operator notes..."
        class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-200 resize-none"
      ></textarea>

      <button
        class="w-full h-9 rounded border border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300"
      >
        Save Note
      </button>
    </div>

    <!-- EVIDENCE -->
    <div class="space-y-2">
      <div class="text-[11px] uppercase tracking-wide text-slate-500">
        Evidence
      </div>

      <div
        class="border border-dashed border-slate-700 rounded-lg p-6 text-center text-slate-500 bg-slate-900"
      >
        Drag & drop files here
      </div>
    </div>

    <!-- NAVIGATION -->
    <div class="space-y-2">
      <div class="text-[11px] uppercase tracking-wide text-slate-500">
        Navigation
      </div>

      <div class="grid grid-cols-1 gap-2">
        <button
          class="h-9 rounded border border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300"
        >
          Open Related Cameras
        </button>

        <button
          class="h-9 rounded border border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300"
        >
          Open Related Playback
        </button>

        <button
          class="h-9 rounded border border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300"
        >
          Jump to Map
        </button>

        <button
          class="h-9 rounded border border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300"
        >
          Follow Truck
        </button>
      </div>
    </div>
  </div>
</section>
