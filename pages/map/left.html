<!-- ./pages/map/left.html -->
<div id="mapSidebar" class="h-full bg-slate-950 flex flex-col">
  <!-- HEADER -->
  <button
    id="layersCollapseBtn"
    class="px-4 py-4 border-b border-slate-800 hover:bg-slate-900 transition flex items-center justify-between text-left"
  >
    <div>
      <div class="text-sm font-semibold text-white">Map Layers</div>

      <div class="text-xs text-slate-500 mt-1">
        Facility visualization controls
      </div>
    </div>

    <div
      id="layersCollapseIcon"
      class="text-slate-500 text-sm transition-transform"
    >
      ▼
    </div>
  </button>

  <!-- ALL LAYERS -->
  <div id="layersContainer" class="flex-1 overflow-y-auto p-3 space-y-3">
    <!-- TRUCKS -->
    <div class="rounded-xl border border-slate-800 bg-slate-900/60 p-3">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="w-2 h-2 rounded-full bg-cyan-400"></div>

          <span class="text-sm text-slate-200"> Trucks </span>
        </div>

        <button
          class="layer-visibility w-11 h-6 rounded-full bg-cyan-500 relative transition"
          data-enabled="true"
        >
          <div
            class="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-white transition"
          ></div>
        </button>
      </div>

      <div>
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs text-slate-400"> Opacity </span>

          <span class="text-xs text-slate-500 opacity-value"> 85% </span>
        </div>

        <input
          type="range"
          min="0"
          max="100"
          value="85"
          class="w-full accent-cyan-500"
        />
      </div>
    </div>

    <!-- ROUTES -->
    <div class="rounded-xl border border-slate-800 bg-slate-900/60 p-3">

          value="70"
          class="w-full accent-cyan-500"
