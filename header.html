<!-- ./components/header.html -->
<header
  class="h-14 min-h-[56px] border-b border-slate-800 bg-slate-900/95 backdrop-blur flex items-center justify-between px-4 gap-4 shadow-lg"
>
  <!-- LEFT -->
  <div class="flex items-center gap-4 min-w-0">
    <!-- Brand -->
    <div class="flex items-center gap-3 pr-4 border-r border-slate-800">
      <div
        class="w-8 h-8 rounded-lg bg-cyan-500/20 border border-cyan-500/30 flex items-center justify-center"
      >
        <div class="w-3 h-3 rounded-sm bg-cyan-400"></div>
      </div>

      <div class="leading-tight">
        <div class="text-sm font-semibold tracking-wide text-white">
          Smart Parking Ops
        </div>

        <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500">
          Facility Control Platform
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex items-center gap-1">
      <button
        data-tab="live"
        class="tab h-9 px-4 rounded-lg hover:bg-slate-800 text-sm text-slate-300"
      >
        Live
      </button>

      <button
        data-tab="replay"
        class="tab h-9 px-4 rounded-lg hover:bg-slate-800 text-sm text-slate-300"
      >
        Playback
      </button>

      <button
        data-tab="map"
        class="tab h-9 px-4 rounded-lg hover:bg-slate-800 text-sm text-slate-300"
      >
        Map
      </button>

      <button
        data-tab="alerts"
        class="tab h-9 px-4 rounded-lg hover:bg-slate-800 text-sm text-slate-300 relative flex items-center"
      >
        Alerts

        <span
          class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-red-500 text-[10px] font-bold flex items-center justify-center text-white"
        >
          5
        </span>
      </button>
    </nav>
  </div>

  <!-- CENTER -->
  <div class="flex-1 max-w-2xl">
    <div
      class="h-10 rounded-xl bg-slate-800 border border-slate-700 flex items-center px-4 gap-3 focus-within:border-cyan-500/50 focus-within:ring-2 focus-within:ring-cyan-500/10 transition-all"
    >
      <!-- Search Icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4 text-slate-500 shrink-0"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>

      <!-- Input -->
      <input
        type="text"
        placeholder="Search cameras, trucks, alerts..."
        class="flex-1 bg-transparent outline-none text-sm text-slate-200 placeholder:text-slate-500"
      />

      <!-- Shortcut -->
      <div
        class="px-2 py-1 rounded bg-slate-700 text-[11px] text-slate-400 border border-slate-600"
      >
        /
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="flex items-center gap-3">
    <!-- Recording -->
    <div
      class="h-9 px-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 flex items-center gap-2"
    >
      <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
      <span class="text-xs text-emerald-200 font-medium">Recording</span>
    </div>

    <!-- Cameras -->
    <div
      class="h-9 px-3 rounded-lg bg-yellow-500/10 border border-yellow-500/20 flex items-center gap-2"
    >
      <div class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
      <span class="text-xs text-yellow-200 font-medium">108 / 110 Cameras</span>
    </div>

    <!-- AI -->
    <div
      class="h-9 px-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 flex items-center gap-2"
    >
      <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
      <span class="text-xs text-emerald-200 font-medium">AI</span>
    </div>

    <!-- Network -->
    <div
      class="h-9 px-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 flex items-center gap-2"
    >
      <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
      <span class="text-xs text-emerald-200 font-medium">Network</span>
    </div>

    <!-- Operator -->
    <div class="flex items-center gap-3 pl-3 border-l border-slate-800">
      <div class="text-right leading-tight hidden md:block">
        <div class="text-sm font-medium text-white">Operator A12</div>
        <div class="text-[11px] text-slate-500 uppercase tracking-wide">
          Night Shift
        </div>
      </div>

      <div
        class="w-9 h-9 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-sm font-bold text-white shadow-md"
      >
        OP
      </div>
    </div>
  </div>
</header>
